name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: TypeScript + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (all 4 packages)
        run: |
          echo "=== shared ==="; cd packages/shared && npx tsc --noEmit && cd ../..
          echo "=== core ==="; cd packages/core && npx tsc --noEmit && cd ../..
          echo "=== server ==="; cd packages/server && npx tsc --noEmit && cd ../..
          echo "=== web ==="; cd packages/web && npx tsc --noEmit && cd ../..

      - name: Tests
        run: pnpm -r test

  lint-biome:
    name: Biome lint (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # advisory during Phase 0 transition (ESLint still primary)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm biome:check || true
