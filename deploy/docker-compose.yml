# AEMR production stack
# Запуск:  docker compose -f deploy/docker-compose.yml --env-file deploy/.env.production up -d --build

name: aemr

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-:80}
    depends_on:
      web:
        condition: service_started
      server:
        condition: service_healthy
    networks: [aemr]

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    image: aemr-web:latest
    restart: unless-stopped
    expose: ["80"]
    networks: [aemr]

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    image: aemr-server:latest
    restart: unless-stopped
    expose: ["3000"]
    env_file:
      - ./.env.production
    volumes:
      - server_data:/app/data
    networks: [aemr]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  server_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  aemr:
    driver: bridge
